- name: download shiori
  get_url:
    url: https://github.com/go-shiori/shiori/releases/download/v1.5.0/shiori-linux-amd64
    dest: /usr/local/bin/shiori
    mode: a+x
    checksum: sha256:aeca594f8466d4e6d9b49729016b03c8b114a50952a6d4cdbfb53deb2ede4985

- name: copy systemd service
  copy:
    src: shiori.service
    dest: /etc/systemd/system/shiori.service

- name: enable service
  systemd:
    name: shiori.service
    enabled: yes
    started: yes
